# GitHub label definitions for qwibo/qwibo
# Apply with: python scripts/github_issue.py labels --apply

labels:
  - name: bug
    color: d73a4a
    description: Something isn't working

  - name: enhancement
    color: a2eeef
    description: New feature or request

  - name: task
    color: 0075ca
    description: Sprint task or actionable work item

  - name: documentation
    color: 0075ca
    description: Documentation improvements

  - name: priority-high
    color: b60205
    description: High priority — blocks release or core UX

  - name: priority-medium
    color: fbca04
    description: Medium priority

  - name: priority-low
    color: 0e8a16
    description: Low priority or nice-to-have

  - name: area-ui
    color: 1d76db
    description: User interface and UX

  - name: area-summary
    color: 5319e7
    description: LLM summary pipeline and quality

  - name: area-asr
    color: 006b75
    description: Speech recognition / transcription

  - name: area-desktop
    color: c5def5
    description: Electron desktop shell and installer

  - name: area-docker
    color: bfdadc
    description: Docker deployment and containers

  - name: imported
    color: e4e669
    description: Imported from legacy tracker (TRACCIAMENTO-BUG.md or plans)
